services:
  postgres:
    image: postgres:16-alpine
  restart: unless-stopped
  environment:
    POSTGRES_USER: speedometer
    POSTGRES_PASSWORD: speedometer
    POSTGRES_DB: speedometer
  ports:
    - "5432:5432"
  volumes:
    - ./db:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: speedometer
      PGPASSWORD: speedometer
      PGDATABASE: speedometer
      PORT: 4000
      HOST: 0.0.0.0
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

